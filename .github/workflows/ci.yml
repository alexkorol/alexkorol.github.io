name: CI and deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run eval
      - name: Build static routes
        run: npm run build
        env:
          VITE_PORTFOLIO_API_URL: ${{ vars.PORTFOLIO_API_URL }}
      - name: Enforce Lighthouse budgets
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      - uses: actions/configure-pages@v5
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          path: dist

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy verified static artifact
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-worker:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy Worker when production credentials exist
        if: env.CLOUDFLARE_API_TOKEN != '' && env.ANTHROPIC_API_KEY != ''
        run: |
          npm run worker:deploy
          $env:ANTHROPIC_API_KEY | npx wrangler secret put ANTHROPIC_API_KEY --config worker/wrangler.toml
        shell: pwsh
      - name: Explain skipped Worker deployment
        if: env.CLOUDFLARE_API_TOKEN == '' || env.ANTHROPIC_API_KEY == ''
        run: echo "Worker deployment skipped; add CLOUDFLARE_API_TOKEN and ANTHROPIC_API_KEY repository secrets."
